<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="lightBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>
  </defs>
  
  <!-- 淡色圆形背景 -->
  <circle cx="256" cy="256" r="240" fill="url(#lightBg2)"/>
  
  <!-- 账本/凭证本 - 简约深色 -->
  <g fill="#1e293b">
    <!-- 书脊 -->
    <rect x="130" y="100" width="25" height="312" rx="4"/>
    
    <!-- 书页 -->
    <rect x="155" y="100" width="230" height="312" rx="12" fill="#334155"/>
    
    <!-- 装订线 -->
    <line x1="175" y1="100" x2="175" y2="412" stroke="#1e293b" stroke-width="3"/>
    
    <!-- 内容线条 -->
    <rect x="195" y="150" width="160" height="16" rx="8" fill="#1e293b"/>
    <rect x="195" y="190" width="140" height="12" rx="6" fill="#475569"/>
    <rect x="195" y="220" width="150" height="12" rx="6" fill="#475569"/>
    
    <!-- 钥匙图标位置 -->
    <circle cx="250" cy="320" r="35" fill="none" stroke="#1e293b" stroke-width="14"/>
    <rect x="242" y="320" width="16" height="45" rx="6" fill="#1e293b"/>
  </g>
</svg>