<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密钥终端 - Secure Ledger</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }
    
    .logo-container {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
      animation: fadeIn 0.5s ease-out;
    }
    
    .logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(59, 130, 246, 0.3);
    }
    
    .logo svg {
      width: 40px;
      height: 40px;
      fill: white;
    }
    
    .app-title {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      animation: fadeIn 0.5s ease-out 0.2s both;
    }
    
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(148, 163, 184, 0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    .loading-text {
      font-size: 14px;
      color: #94a3b8;
      letter-spacing: 0.5px;
    }
    
    .progress-container {
      width: 200px;
      height: 4px;
      background: rgba(148, 163, 184, 0.2);
      border-radius: 2px;
      overflow: hidden;
    }
    
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6 0%, #8b5cf6 100%);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }
    
    .version {
      position: fixed;
      bottom: 20px;
      font-size: 12px;
      color: #64748b;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    @keyframes fadeIn {
      from { 
        opacity: 0;
        transform: translateY(10px);
      }
      to { 
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 6c1.4 0 2.8 1.1 2.8 2.5V11c.6.3 1 .9 1 1.5v3c0 1-.8 1.8-1.8 1.8h-4c-1 0-1.8-.8-1.8-1.8v-3c0-.6.4-1.2 1-1.5V9.5C9.2 8.1 10.6 7 12 7zm0 1.2c-.8 0-1.5.7-1.5 1.5V11h3V9.7c0-.8-.7-1.5-1.5-1.5z"/>
      </svg>
    </div>
    <div class="app-title">密钥终端</div>
  </div>
  
  <div class="loading-container">
    <div class="spinner"></div>
    <div class="loading-text" id="status">正在初始化...</div>
    <div class="progress-container">
      <div class="progress-bar" id="progress"></div>
    </div>
  </div>
  
  <div class="version">v1.0.0</div>
  
  <script>
    const { ipcRenderer } = require('electron');
    
    const statusEl = document.getElementById('status');
    const progressEl = document.getElementById('progress');
    
    // 监听启动进度
    ipcRenderer.on('splash:progress', (event, data) => {
      if (data.message) {
        statusEl.textContent = data.message;
      }
      if (data.progress !== undefined) {
        progressEl.style.width = data.progress + '%';
      }
    });
  </script>
</body>
</html>
