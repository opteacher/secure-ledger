{
  "appId": "com.secure-ledger.app",
  "productName": "野녽뮙瀯덄ク",
  "copyright": "Copyright 짤 2026 SecureLedger Team",
  "directories": {
    "output": "release"
  },
  "files": [
    "dist/**/*",
    "dist-electron/**/*",
    "public/**/*"
  ],
  "asar": true,
  "npmRebuild": false,
  "win": {
    "target": [
      "nsis",
      "portable"
    ],
    "icon": "public/app.ico"
  },
  "nsis": {
    "oneClick": false,
    "allowToChangeInstallationDirectory": true,
    "createDesktopShortcut": true,
    "createStartMenuShortcut": true,
    "shortcutName": "野녽뮙瀯덄ク"
  },
  "linux": {
    "target": [
      {
        "target": "deb",
        "arch": ["x64"]
      },
      {
        "target": "tar.gz",
        "arch": ["x64"]
      }
    ],
    "category": "Utility",
    "maintainer": "SecureLedger Team",
    "icon": "public/logo.svg",
    "desktop": {
      "Name": "野녽뮙瀯덄ク",
      "Comment": "Credential management and automation platform",
      "Categories": "Utility;Security"
    }
  },
  "deb": {
    "afterInstall": "scripts/postinst.sh",
    "depends": ["sshpass"]
  },
  "mac": {
    "target": [
      "dmg"
    ],
    "icon": "public/icon-512.png"
  },
  "extraResources": [
    {
      "from": "public",
      "to": "public"
    },
    {
      "from": "scripts",
      "to": "scripts"
    },
    {
      "from": "ttyd",
      "to": "ttyd"
    },
    {
      "from": "build-chromium",
      "to": "chromiums",
      "filter": ["**/*.zip"]
    },
    {
      "from": "node_modules/sql.js/dist/sql-wasm.wasm",
      "to": "sql-wasm.wasm"
    }
  ]
}