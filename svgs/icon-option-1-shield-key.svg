<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 深蓝渐变背景 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="50%" style="stop-color:#0f2744"/>
      <stop offset="100%" style="stop-color:#0a1929"/>
    </linearGradient>
    
    <!-- 盾牌渐变 -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    
    <!-- 金色钥匙渐变 -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd34d"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
    
    <!-- 高光 -->
    <linearGradient id="highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#3b82f6" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>
  
  <!-- 内圈装饰 -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#1e40af" stroke-width="1" stroke-opacity="0.5"/>
  
  <!-- 盾牌主体 -->
  <path d="M256 70
           C290 70 380 110 380 110
           L380 250
           C380 340 320 410 256 450
           C192 410 132 340 132 250
           L132 110
           C132 110 222 70 256 70Z"
        fill="url(#shieldGrad)"
        filter="url(#shadow)"/>
  
  <!-- 盾牌高光 -->
  <path d="M256 80
           C285 80 365 115 365 115
           L365 245
           C365 325 310 390 256 425
           C202 390 147 325 147 245
           L147 115
           C147 115 227 80 256 80Z"
        fill="url(#highlight)"/>
  
  <!-- 盾牌边框 -->
  <path d="M256 80
           C285 80 365 115 365 115
           L365 245
           C365 325 310 390 256 425
           C202 390 147 325 147 245
           L147 115
           C147 115 227 80 256 80Z"
        fill="none"
        stroke="#60a5fa"
        stroke-width="2"
        stroke-opacity="0.6"/>
  
  <!-- 钥匙头部 -->
  <circle cx="256" cy="190" r="42" fill="url(#goldGrad)" filter="url(#glow)"/>
  
  <!-- 钥匙孔 -->
  <circle cx="256" cy="185" r="16" fill="#0f2744"/>
  <rect x="250" y="185" width="12" height="22" rx="4" fill="#0f2744"/>
  
  <!-- 钥匙柄 -->
  <rect x="248" y="232" width="16" height="100" rx="8" fill="url(#goldGrad)"/>
  
  <!-- 钥匙齿 -->
  <rect x="264" y="280" width="30" height="12" rx="6" fill="url(#goldGrad)"/>
  <rect x="264" y="302" width="24" height="12" rx="6" fill="url(#goldGrad)"/>
  <rect x="264" y="324" width="28" height="12" rx="6" fill="url(#goldGrad)"/>
  
  <!-- 装饰点 -->
  <circle cx="185" cy="380" r="6" fill="#60a5fa" fill-opacity="0.6"/>
  <circle cx="327" cy="380" r="6" fill="#60a5fa" fill-opacity="0.6"/>
  <circle cx="175" cy="350" r="4" fill="#60a5fa" fill-opacity="0.4"/>
  <circle cx="337" cy="350" r="4" fill="#60a5fa" fill-opacity="0.4"/>
</svg>