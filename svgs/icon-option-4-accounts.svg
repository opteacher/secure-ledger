<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="accountBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="50%" style="stop-color:#312e81"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    
    <!-- 卡片渐变 -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#3730a3"/>
    </linearGradient>
    
    <!-- 用户渐变 -->
    <linearGradient id="userGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    
    <!-- 金色渐变 -->
    <linearGradient id="accentGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd34d"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    
    <!-- 阴影 -->
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    
    <filter id="glowIndigo" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <circle cx="256" cy="256" r="245" fill="url(#accountBg)"/>
  
  <!-- 装饰圆环 -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#4f46e5" stroke-width="1" stroke-opacity="0.3"/>
  
  <!-- 后面的卡片 -->
  <g transform="rotate(-15 256 256)" filter="url(#cardShadow)">
    <rect x="140" y="100" width="200" height="260" rx="16" fill="#312e81" opacity="0.6"/>
  </g>
  
  <g transform="rotate(10 256 256)" filter="url(#cardShadow)">
    <rect x="180" y="120" width="200" height="260" rx="16" fill="#3730a3" opacity="0.8"/>
  </g>
  
  <!-- 主卡片 -->
  <rect x="170" y="150" width="220" height="280" rx="18" fill="url(#cardGrad)" filter="url(#cardShadow)"/>
  
  <!-- 卡片边框 -->
  <rect x="170" y="150" width="220" height="280" rx="18" fill="none" stroke="#818cf8" stroke-width="2" stroke-opacity="0.5"/>
  
  <!-- 卡片高光 -->
  <rect x="180" y="160" width="200" height="60" rx="12" fill="#ffffff" fill-opacity="0.1"/>
  
  <!-- 用户头像区 -->
  <circle cx="280" cy="230" r="45" fill="#1e1b4b"/>
  <circle cx="280" cy="218" r="22" fill="url(#userGrad)"/>
  <ellipse cx="280" cy="260" rx="28" ry="18" fill="url(#userGrad)"/>
  
  <!-- 账户名区域 -->
  <rect x="200" y="290" width="160" height="14" rx="7" fill="#818cf8" fill-opacity="0.4"/>
  <rect x="220" y="315" width="120" height="10" rx="5" fill="#818cf8" fill-opacity="0.3"/>
  
  <!-- 分隔线 -->
  <line x1="190" y1="345" x2="370" y2="345" stroke="#6366f1" stroke-width="1" stroke-opacity="0.5"/>
  
  <!-- 密码/凭证区域 -->
  <rect x="195" y="360" width="170" height="20" rx="6" fill="#1e1b4b"/>
  <g fill="#4f46e5">
    <circle cx="210" cy="370" r="5"/>
    <circle cx="228" cy="370" r="5"/>
    <circle cx="246" cy="370" r="5"/>
    <circle cx="264" cy="370" r="5"/>
    <circle cx="282" cy="370" r="5"/>
    <circle cx="300" cy="370" r="5"/>
    <circle cx="318" cy="370" r="5"/>
    <circle cx="336" cy="370" r="5"/>
    <circle cx="354" cy="370" r="5"/>
  </g>
  
  <!-- 钥匙图标 -->
  <g transform="translate(185, 395)">
    <circle cx="20" cy="12" r="10" fill="url(#accentGold)"/>
    <circle cx="20" cy="12" r="5" fill="#1e1b4b"/>
    <rect x="18" y="18" width="4" height="25" rx="2" fill="url(#accentGold)"/>
    <rect x="22" y="30" width="12" height="4" rx="2" fill="url(#accentGold)"/>
    <rect x="22" y="38" width="8" height="4" rx="2" fill="url(#accentGold)"/>
  </g>
  
  <!-- 复制按钮 -->
  <rect x="280" y="395" width="80" height="30" rx="8" fill="#4f46e5"/>
  <rect x="295" y="405" width="18" height="14" rx="2" fill="none" stroke="#a5b4fc" stroke-width="2"/>
  <rect x="302" y="400" width="18" height="14" rx="2" fill="none" stroke="#a5b4fc" stroke-width="2"/>
  <text x="330" y="415" font-family="Arial" font-size="10" fill="#a5b4fc">复制</text>
  
  <!-- 装饰元素 -->
  <circle cx="120" cy="180" r="8" fill="#f59e0b" fill-opacity="0.6"/>
  <circle cx="400" cy="200" r="6" fill="#f59e0b" fill-opacity="0.4"/>
  <circle cx="380" cy="400" r="10" fill="#6366f1" fill-opacity="0.5"/>
  <circle cx="130" cy="380" r="7" fill="#6366f1" fill-opacity="0.4"/>
</svg>