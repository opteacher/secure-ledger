<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="lightBg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f3ff"/>
      <stop offset="100%" style="stop-color:#ddd6fe"/>
    </linearGradient>
  </defs>
  
  <!-- 淡紫色圆形背景 -->
  <circle cx="256" cy="256" r="240" fill="url(#lightBg6)"/>
  
  <!-- 多账户卡片 - 极简 -->
  <g fill="#312e81">
    <!-- 后面的卡片 -->
    <rect x="140" y="120" width="180" height="240" rx="16" fill="#6366f1" opacity="0.3"/>
    
    <!-- 中间的卡片 -->
    <rect x="160" y="140" width="180" height="240" rx="16" fill="#4f46e5" opacity="0.5"/>
    
    <!-- 主卡片 -->
    <rect x="180" y="160" width="180" height="240" rx="16"/>
    
    <!-- 用户头像 -->
    <circle cx="270" cy="230" r="30" fill="#818cf8"/>
    <circle cx="270" cy="220" r="14" fill="#c7d2fe"/>
    <ellipse cx="270" cy="248" rx="18" ry="12" fill="#c7d2fe"/>
    
    <!-- 账户名 -->
    <rect x="220" y="280" width="100" height="12" rx="6" fill="#818cf8"/>
    <rect x="235" y="302" width="70" height="8" rx="4" fill="#a5b4fc"/>
    
    <!-- 分隔线 -->
    <line x1="200" y1="330" x2="340" y2="330" stroke="#6366f1" stroke-width="2"/>
    
    <!-- 密码点 -->
    <g fill="#6366f1">
      <circle cx="215" cy="360" r="6"/>
      <circle cx="235" cy="360" r="6"/>
      <circle cx="255" cy="360" r="6"/>
      <circle cx="275" cy="360" r="6"/>
      <circle cx="295" cy="360" r="6"/>
      <circle cx="315" cy="360" r="6"/>
    </g>
  </g>
</svg>