<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="lightBg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fefce8"/>
      <stop offset="100%" style="stop-color:#fef08a"/>
    </linearGradient>
  </defs>
  
  <!-- 淡黄色圆形背景 -->
  <circle cx="256" cy="256" r="240" fill="url(#lightBg5)"/>
  
  <!-- 钥匙 - 极简扁平风格 -->
  <g fill="#713f12">
    <!-- 钥匙头（圆环） -->
    <circle cx="190" cy="190" r="70" fill="none" stroke="#713f12" stroke-width="22"/>
    
    <!-- 钥匙柄 -->
    <rect x="172" y="250" width="36" height="180" rx="18"/>
    
    <!-- 钥匙齿 -->
    <rect x="208" y="330" width="60" height="22" rx="11"/>
    <rect x="208" y="370" width="45" height="22" rx="11"/>
    <rect x="208" y="410" width="35" height="22" rx="11"/>
  </g>
</svg>