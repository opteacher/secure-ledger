<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="simpleBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e"/>
      <stop offset="50%" style="stop-color:#075985"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
    
    <!-- 钥匙渐变 -->
    <linearGradient id="keyMainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="30%" style="stop-color:#0ea5e9"/>
      <stop offset="70%" style="stop-color:#0284c7"/>
      <stop offset="100%" style="stop-color:#0369a1"/>
    </linearGradient>
    
    <!-- 金色装饰 -->
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="50%" style="stop-color:#fcd34d"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    
    <!-- 阴影 -->
    <filter id="keyShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    
    <filter id="blueGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#0ea5e9" flood-opacity="0.6"/>
    </filter>
    
    <!-- 高光 -->
    <linearGradient id="keyHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <circle cx="256" cy="256" r="245" fill="url(#simpleBg)"/>
  
  <!-- 内圈装饰 -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#0284c7" stroke-width="2" stroke-opacity="0.3"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="#0284c7" stroke-width="1" stroke-dasharray="8,4" stroke-opacity="0.2"/>
  
  <!-- 主钥匙 -->
  <g filter="url(#keyShadow)">
    <!-- 钥匙头部（圆形） -->
    <circle cx="200" cy="180" r="70" fill="url(#keyMainGrad)" filter="url(#blueGlow)"/>
    
    <!-- 钥匙头部内圈 -->
    <circle cx="200" cy="180" r="50" fill="#0c4a6e"/>
    
    <!-- 钥匙孔 -->
    <circle cx="200" cy="175" r="18" fill="url(#keyMainGrad)"/>
    <rect x="192" y="175" width="16" height="30" rx="6" fill="url(#keyMainGrad)"/>
    
    <!-- 钥匙柄 -->
    <rect x="185" y="240" width="30" height="200" rx="15" fill="url(#keyMainGrad)"/>
    
    <!-- 钥匙齿 -->
    <rect x="215" y="340" width="60" height="22" rx="11" fill="url(#keyMainGrad)"/>
    <rect x="215" y="375" width="45" height="22" rx="11" fill="url(#keyMainGrad)"/>
    <rect x="215" y="410" width="55" height="22" rx="11" fill="url(#keyMainGrad)"/>
  </g>
  
  <!-- 钥匙高光 -->
  <ellipse cx="185" cy="160" rx="35" ry="50" fill="url(#keyHighlight)" transform="rotate(-20 185 160)"/>
  <rect x="190" y="250" width="10" height="100" rx="5" fill="url(#keyHighlight)"/>
  
  <!-- 小装饰钥匙 -->
  <g transform="translate(320, 80) scale(0.35)" opacity="0.6">
    <circle cx="100" cy="100" r="60" fill="url(#goldAccent)"/>
    <circle cx="100" cy="100" r="40" fill="#0c4a6e"/>
    <circle cx="100" cy="95" r="15" fill="url(#goldAccent)"/>
    <rect x="93" y="95" width="14" height="25" rx="5" fill="url(#goldAccent)"/>
    <rect x="85" y="150" width="30" height="120" rx="15" fill="url(#goldAccent)"/>
    <rect x="115" y="200" width="50" height="18" rx="9" fill="url(#goldAccent)"/>
    <rect x="115" y="230" width="35" height="18" rx="9" fill="url(#goldAccent)"/>
  </g>
  
  <!-- 装饰点 -->
  <circle cx="350" cy="350" r="10" fill="#f59e0b" fill-opacity="0.5"/>
  <circle cx="380" cy="300" r="6" fill="#38bdf8" fill-opacity="0.6"/>
  <circle cx="100" cy="400" r="8" fill="#38bdf8" fill-opacity="0.5"/>
  <circle cx="130" cy="350" r="5" fill="#f59e0b" fill-opacity="0.4"/>
  
  <!-- 底部装饰线 -->
  <path d="M100 450 Q200 430 256 450 Q312 470 412 450" stroke="#0284c7" stroke-width="2" fill="none" stroke-opacity="0.3"/>
</svg>