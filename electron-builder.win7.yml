appId: "com.secure-ledger.app"
productName: "野녽뮙瀯덄ク"
copyright: "Copyright 짤 2026 SecureLedger Team"
electronVersion: "22.3.27"

directories:
  output: "release"

files:
  - "dist/**/*"
  - "dist-electron/**/*"
  - "public/**/*"

asar: true
npmRebuild: false

win:
  target:
    - target: "nsis"
      arch: ["x64"]
    - target: "portable"
      arch: ["x64"]
  icon: "public/app.ico"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "野녽뮙瀯덄ク"
  artifactName: "${productName}-${version}-win7-setup.${ext}"

extraResources:
  - from: "public"
    to: "public"
  - from: "scripts"
    to: "scripts"
  - from: "ttyd"
    to: "ttyd"
  - from: "build-chromium"
    to: "chromiums"
    filter:
      - "**/*.zip"
  - from: "node_modules/sql.js/dist/sql-wasm.wasm"
    to: "sql-wasm.wasm"